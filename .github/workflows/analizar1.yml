name: Analizar IBEX35 nuevo

on:
  schedule:
    # Horarios UTC (2 horas menos que tu zona horaria)
    - cron: '0 7 * * 1-5'      # 7:00 UTC -> 9:00 local
    - cron: '15 7 * * 1-5'     # 7:15 UTC -> 9:15 local
    - cron: '30 7 * * 1-5'     # 7:30 UTC -> 9:30 local
    - cron: '45 7 * * 1-5'     # 7:45 UTC -> 9:45 local
    
    - cron: '0 8 * * 1-5'      # 8:00 UTC -> 10:00 local
    - cron: '15 8 * * 1-5'     # 8:15 UTC -> 10:15 local
    - cron: '30 8 * * 1-5'     # 8:30 UTC -> 10:30 local
    - cron: '45 8 * * 1-5'     # 8:45 UTC -> 10:45 local
    
    - cron: '0 9 * * 1-5'      # 9:00 UTC -> 11:00 local
    - cron: '15 9 * * 1-5'     # 9:15 UTC -> 11:15 local
    - cron: '30 9 * * 1-5'     # 9:30 UTC -> 11:30 local
    - cron: '45 9 * * 1-5'     # 9:45 UTC -> 11:45 local
    
    - cron: '0 10 * * 1-5'     # 10:00 UTC -> 12:00 local
    - cron: '15 10 * * 1-5'    # 10:15 UTC -> 12:15 local
    - cron: '30 10 * * 1-5'    # 10:30 UTC -> 12:30 local
    - cron: '45 10 * * 1-5'    # 10:45 UTC -> 12:45 local
    
    - cron: '0 11 * * 1-5'     # 11:00 UTC -> 13:00 local
    - cron: '15 11 * * 1-5'    # 11:15 UTC -> 13:15 local
    - cron: '30 11 * * 1-5'    # 11:30 UTC -> 13:30 local
    - cron: '45 11 * * 1-5'    # 11:45 UTC -> 13:45 local
    
    - cron: '0 12 * * 1-5'     # 12:00 UTC -> 14:00 local
    - cron: '15 12 * * 1-5'    # 12:15 UTC -> 14:15 local
    - cron: '30 12 * * 1-5'    # 12:30 UTC -> 14:30 local
    - cron: '45 12 * * 1-5'    # 12:45 UTC -> 14:45 local
    
    - cron: '0 13 * * 1-5'     # 13:00 UTC -> 15:00 local
    - cron: '15 13 * * 1-5'    # 13:15 UTC -> 15:15 local
    - cron: '30 13 * * 1-5'    # 13:30 UTC -> 15:30 local
    - cron: '45 13 * * 1-5'    # 13:45 UTC -> 15:45 local
    
    - cron: '0 14 * * 1-5'     # 14:00 UTC -> 16:00 local
    - cron: '15 14 * * 1-5'    # 14:15 UTC -> 16:15 local
    - cron: '30 14 * * 1-5'    # 14:30 UTC -> 16:30 local
    - cron: '45 14 * * 1-5'    # 14:45 UTC -> 16:45 local
    
    - cron: '0 15 * * 1-5'     # 15:00 UTC -> 17:00 local
    - cron: '15 15 * * 1-5'    # 15:15 UTC -> 17:15 local
    - cron: '30 15 * * 1-5'    # 15:30 UTC -> 17:30 local

  workflow_dispatch:

jobs:
  analizar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Instalar dependencias
      run: |
        pip install yfinance pandas numpy supabase
    
    - name: Ejecutar analizador
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      run: |
        python analizador_ibex.py
