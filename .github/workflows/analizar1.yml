name: Analizar IBEX35 nuevo

on:
  schedule:
    - cron: '0 7,8,9,10,11,12,13,14,15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analizar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy supabase requests

      - name: Log ejecución
        run: date

      - name: Ejecutar analizador
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python analizador_ibex.py

      - name: Ejecutar detección de señales en Supabase
        run: |
          curl -X POST "https://klwcletpqqsabtdanldx.supabase.co/rest/v1/rpc/detectar_y_notificar_señales" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd2NsZXRwcXFzYWJ0ZGFubGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDg2NTEsImV4cCI6MjA5MjM4NDY1MX0.nbs0tYbFOL-I8qIkgB7Ub_jcOwHTdzg0EcAp1DS6sCU" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Enviar correos con Resend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python -c "
import os
import requests
from supabase import create_client

supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])

response = supabase.table('historial_notificaciones').select('*').eq('enviado_correo', False).execute()
notificaciones = response.data

if len(notificaciones) == 0:
    print('📭 No hay correos pendientes')
    exit(0)

print(f'📧 Enviando {len(notificaciones)} correos...')

for notif in notificaciones:
    user_response = supabase.table('perfiles').select('email').eq('id', notif['usuario_id']).execute()
    if not user_response.data:
        continue
    email = user_response.data[0]['email']
    
    r = requests.post(
        'https://api.resend.com/emails',
        headers={'Authorization': f'Bearer {os.environ["RESEND_API_KEY"]}', 'Content-Type': 'application/json'},
        json={'from': 'notificaciones@resend.dev', 'to': email, 'subject': f'🔔 Alerta: {notif["nombre_empresa"]}', 'html': f'<p>{notif["mensaje"]}</p>'}
    )
    
    if r.status_code == 200:
        supabase.table('historial_notificaciones').update({'enviado_correo': True}).eq('id', notif['id']).execute()
        print(f'✅ Enviado a {email}')
    else:
        print(f'❌ Error: {r.text}')
"
