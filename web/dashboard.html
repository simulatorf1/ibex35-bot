<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Panel</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        button { padding: 8px 16px; margin: 5px; cursor: pointer; }
        .empresa-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-add { background: #1e7e34; color: white; border: none; border-radius: 20px; padding: 4px 12px; }
        .btn-remove { background: #dc3545; color: white; border: none; border-radius: 20px; padding: 4px 12px; }
        .loading { text-align: center; padding: 20px; color: gray; }
    </style>
</head>
<body>
<h1>📊 Mi Panel de Inversión</h1>

<div class="card">
    <h3>👤 Usuario</h3>
    <p id="userEmail">Cargando...</p>
    <button id="btnLogout">Cerrar sesión</button>
</div>

<div class="card">
    <h3>⭐ MIS EMPRESAS</h3>
    <div id="favoritasList"><div class="loading">Cargando...</div></div>
</div>

<div class="card">
    <h3>➕ AÑADIR EMPRESA</h3>
    <input type="text" id="buscador" placeholder="Buscar..." style="width:100%; padding:8px; margin-bottom:10px;">
    <div id="listaEmpresas"><div class="loading">Cargando empresas...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://klwcletpqqsabtdanldx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd2NsZXRwcXFzYWJ0ZGFubGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDg2NTEsImV4cCI6MjA5MjM4NDY1MX0.nbs0tYbFOL-I8qIkgB7Ub_jcOwHTdzg0EcAp1DS6sCU";
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    // Cerrar sesión
    document.getElementById('btnLogout').onclick = async () => {
        await _supabase.auth.signOut();
        window.location.href = '/web/index.html';
    };

    async function init() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            window.location.href = '/web/index.html';
            return;
        }
        currentUser = session.user;
        document.getElementById('userEmail').innerText = currentUser.email;
        
        // Cargar listado de empresas (simulado)
        document.getElementById('listaEmpresas').innerHTML = `
            <div class="empresa-item">Santander <button class="btn-add" onclick="alert('Añadir Santander')">+ Añadir</button></div>
            <div class="empresa-item">BBVA <button class="btn-add" onclick="alert('Añadir BBVA')">+ Añadir</button></div>
            <div class="empresa-item">Inditex <button class="btn-add" onclick="alert('Añadir Inditex')">+ Añadir</button></div>
            <div class="empresa-item">Iberdrola <button class="btn-add" onclick="alert('Añadir Iberdrola')">+ Añadir</button></div>
            <div class="empresa-item">Telefónica <button class="btn-add" onclick="alert('Añadir Telefónica')">+ Añadir</button></div>
        `;
        
        document.getElementById('favoritasList').innerHTML = '<div class="loading">No tienes empresas favoritas. Añade algunas.</div>';
    }
    
    init();
</script>
</body>
</html>
