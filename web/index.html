<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Trader - Análisis Técnico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitulo {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .buscador {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        #inputEmpresa {
            flex: 1;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #btnBuscar {
            padding: 15px 30px;
            font-size: 1rem;
            background: #00b4d8;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        #btnBuscar:hover {
            background: #0096c7;
            transform: scale(1.02);
        }

        .seccion-principal {
            margin-bottom: 40px;
        }

        .seccion-principal h2 {
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
        }

        .grid-empresas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tarjeta-empresa {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeIn 0.3s ease;
        }

        .tarjeta-empresa:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .tarjeta-nombre {
            font-size: 1.3rem;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 5px;
        }

        .tarjeta-ticker {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }

        .tarjeta-precio {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
        }

        .tarjeta-porcentaje {
            font-size: 1rem;
            font-weight: bold;
            margin: 5px 0;
        }

        .positivo { color: #28a745; }
        .negativo { color: #dc3545; }

        .tipo-compra-badge {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            margin: 10px 0;
            background: #1e3c72;
            color: white;
        }

        .tarjeta-fecha {
            font-size: 0.7rem;
            color: #888;
            margin-top: 10px;
        }

        .sin-señales {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            color: white;
        }

        .resultado-detalle {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        .btn-cerrar {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .btn-cerrar:hover {
            background: #5a6268;
        }

        .tipo-compra-tag {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
            background: #1e3c72;
            color: white;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .info-card h3 {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .info-card .valor {
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
        }

        /* Barras de 10 puntos */
        .barra-container {
            margin-top: 10px;
        }
        .barra-label {
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 5px;
        }
        .barra {
            display: flex;
            gap: 4px;
            justify-content: center;
        }
        .punto {
            width: 20px;
            height: 8px;
            border-radius: 2px;
            background-color: #e0e0e0;
            transition: background-color 0.3s;
        }
        .punto.activo {
            background-color: #28a745;
        }

        .seccion {
            margin-top: 25px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .seccion h3 {
            margin-bottom: 15px;
            color: #1e3c72;
        }

        .lista-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            border-left: 3px solid #00b4d8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .volumen-badge {
            background: #1e3c72;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .recomendacion-texto {
            font-size: 1.1rem;
            line-height: 1.5;
            background: #e9ecef;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .tabla-historial {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .tabla-historial th,
        .tabla-historial td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .tabla-historial th {
            background: #1e3c72;
            color: white;
            font-weight: bold;
        }

        .tabla-historial tr:hover {
            background: #f8f9fa;
        }

        .scroll-horizontal {
            overflow-x: auto;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
            .grid-empresas {
                grid-template-columns: 1fr;
            }
            .punto {
                width: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Signal Trader</h1>
        <div class="subtitulo">
            🎯 Señales de compra identificadas en tiempo real
        </div>
        
        <div class="buscador">
            <input type="text" id="inputEmpresa" placeholder="Buscar empresa específica (ej: Santander, BBVA...)" autocomplete="off">
            <button id="btnBuscar">🔍 Analizar</button>
        </div>

        <!-- Sección: Empresas con señal -->
        <div id="seccionSeñales" class="seccion-principal">
            <h2>🟢 EMPRESAS CON SEÑAL DE COMPRA</h2>
            <div id="listaSeñales" class="grid-empresas">
                <div class="loading">🔄 Cargando señales...</div>
            </div>
        </div>

        <!-- Sección: Resultado detallado -->
        <div id="resultadoDetalle" class="hidden"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================
        const SUPABASE_URL = "https://klwcletpqqsabtdanldx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd2NsZXRwcXFzYWJ0ZGFubGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDg2NTEsImV4cCI6MjA5MjM4NDY1MX0.nbs0tYbFOL-I8qIkgB7Ub_jcOwHTdzg0EcAp1DS6sCU";

        // Casos que consideramos "señal" (todos excepto null)
        const CASOS_SEÑAL = [1, 2, 3, 4, 5, 6, 7];

        // Mapeo de casos a descripciones amigables
        const descripcionCompra = {
            1: "🔥 COMPRA INMEDIATA - Máxima fuerza alcista",
            2: "⚠️ COMPRA CON CAUTELA - Buen potencial pero con riesgo",
            3: "📈 REBOTE CORTO PLAZO - Tendencia general aún bajista",
            4: "✅ COMPRA CONSOLIDADA - Tendencia alcista confirmada",
            5: "🏁 COMPRA FINAL - Última oportunidad antes de techo",
            6: "🚀 COMPRA RÁPIDA - Momento óptimo para entrar",
            7: "⏳ PRE-COMPRA - A punto de activarse la señal"
        };

        // Mapeo de casos a resúmenes cortos para tarjetas
        const resumenCorto = {
            1: "Compra Inmediata",
            2: "Compra con Cautela",
            3: "Rebote Corto Plazo",
            4: "Compra Consolidada",
            5: "Compra Final",
            6: "Compra Rápida",
            7: "Pre-Compra"
        };

        // ============================================
        // CONVERTIR SMI A PUNTOS (0-10)
        // ============================================
        function smiToPuntos(smi) {
            if (smi === null || smi === undefined) return 0;
            // SMI típicamente entre -80 y 80
            // mapeamos a 0-10 (sobreventa extremo = 10 puntos)
            let puntos = Math.round(((80 - smi) / 160) * 10);
            puntos = Math.max(0, Math.min(10, puntos));
            return puntos;
        }

        function smiToTendencia(smi) {
            if (smi === null || smi === undefined) return "Neutral";
            if (smi > 20) return "Positiva";
            if (smi < -20) return "Negativa";
            return "Neutral";
        }

        // ============================================
        // GENERAR BARRA DE 10 PUNTOS
        // ============================================
        function generarBarra(puntos) {
            let html = '<div class="barra">';
            for (let i = 0; i < 10; i++) {
                html += `<div class="punto ${i < puntos ? 'activo' : ''}"></div>`;
            }
            html += '</div>';
            return html;
        }

        // ============================================
        // CARGAR EMPRESAS CON SEÑAL
        // ============================================
        async function cargarSeñales() {
            const listaDiv = document.getElementById('listaSeñales');
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?select=*&order=fecha.desc&limit=200`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) throw new Error('Error cargando empresas');
                
                const todosLosAnalisis = await response.json();
                
                // Agrupar por ticker y quedarse con el último
                const ultimosAnalisis = {};
                for (const analisis of todosLosAnalisis) {
                    const ticker = analisis.ticker;
                    if (!ultimosAnalisis[ticker] || new Date(analisis.fecha) > new Date(ultimosAnalisis[ticker].fecha)) {
                        ultimosAnalisis[ticker] = analisis;
                    }
                }
                
                // Filtrar solo los que tienen caso de señal
                const casosSeñal = Object.values(ultimosAnalisis).filter(a => CASOS_SEÑAL.includes(a.caso_numero));
                
                // Ordenar por caso (prioridad)
                casosSeñal.sort((a, b) => {
                    const orden = [1, 6, 2, 7, 4, 3, 5];
                    return orden.indexOf(a.caso_numero) - orden.indexOf(b.caso_numero);
                });
                
                mostrarSeñales(casosSeñal);
                
            } catch (error) {
                console.error('Error:', error);
                listaDiv.innerHTML = '<div class="sin-señales">❌ Error al cargar las señales</div>';
            }
        }

        // ============================================
        // MOSTRAR TARJETAS DE SEÑALES (SOLO INFO BÁSICA)
        // ============================================
        function mostrarSeñales(empresas) {
            const listaDiv = document.getElementById('listaSeñales');
            
            if (empresas.length === 0) {
                listaDiv.innerHTML = '<div class="sin-señales">📭 No hay empresas con señal en este momento</div>';
                return;
            }
            
            let html = '';
            for (const emp of empresas) {
                // Calcular % de subida desde apertura
                let porcentajeSubida = 0;
                if (emp.precio_apertura && emp.precio_apertura > 0 && emp.precio_cierre) {
                    porcentajeSubida = ((emp.precio_cierre - emp.precio_apertura) / emp.precio_apertura) * 100;
                }
                const porcentajeClase = porcentajeSubida >= 0 ? 'positivo' : 'negativo';
                const porcentajeSimbolo = porcentajeSubida >= 0 ? '▲' : '▼';
                const fechaFormateada = new Date(emp.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
                
                html += `
                    <div class="tarjeta-empresa" onclick="verDetalle('${emp.ticker}')">
                        <div class="tarjeta-nombre">${emp.nombre_empresa}</div>
                        <div class="tarjeta-ticker">${emp.ticker}</div>
                        <div class="tarjeta-precio">${emp.precio_cierre} €</div>
                        <div class="tarjeta-porcentaje ${porcentajeClase}">${porcentajeSimbolo} ${Math.abs(porcentajeSubida).toFixed(2)}% desde apertura</div>
                        <div class="tipo-compra-badge">${resumenCorto[emp.caso_numero] || 'Señal de Compra'}</div>
                        <div class="tarjeta-fecha">📅 ${fechaFormateada}</div>
                    </div>
                `;
            }
            
            listaDiv.innerHTML = html;
        }

        // ============================================
        // VER DETALLE DE EMPRESA CON HISTORIAL
        // ============================================
        async function verDetalle(ticker) {
            const seccionSeñales = document.getElementById('seccionSeñales');
            const resultadoDiv = document.getElementById('resultadoDetalle');
            
            seccionSeñales.classList.add('hidden');
            resultadoDiv.classList.remove('hidden');
            resultadoDiv.innerHTML = '<div class="loading">🔄 Cargando datos...</div>';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?ticker=eq.${encodeURIComponent(ticker)}&order=fecha.desc&limit=30`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) throw new Error('Error cargando detalle');
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    mostrarDetalleConHistorial(data);
                } else {
                    resultadoDiv.innerHTML = '<div class="error">No se encontraron datos</div>';
                }
                
            } catch (error) {
                resultadoDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        // ============================================
        // PROCESAR SOPORTES Y RESISTENCIAS ORDENADOS POR VOLUMEN
        // ============================================
        function procesarNiveles(texto, tipo) {
            if (!texto) return [];
            
            const lineas = texto.split('\n');
            const niveles = [];
            
            for (const linea of lineas) {
                if (!linea.trim()) continue;
                // Intentar extraer precio y volumen (formato esperado: "precio - volumen" o similar)
                const matchPrecio = linea.match(/(\d+(?:\.\d+)?)/);
                const precio = matchPrecio ? parseFloat(matchPrecio[1]) : 0;
                
                // Extraer volumen si existe
                let volumen = 0;
                const matchVolumen = linea.match(/vol\s*[=:]\s*(\d+(?:\.\d+)?(?:[KM]?))/i);
                if (matchVolumen) {
                    let volStr = matchVolumen[1];
                    if (volStr.includes('M')) volumen = parseFloat(volStr) * 1000000;
                    else if (volStr.includes('K')) volumen = parseFloat(volStr) * 1000;
                    else volumen = parseFloat(volStr);
                } else {
                    // Asignar volumen aleatorio para ordenar (en producción vendría de datos reales)
                    volumen = Math.random() * 1000000;
                }
                
                niveles.push({
                    texto: linea,
                    precio: precio,
                    volumen: volumen
                });
            }
            
            // Ordenar por volumen descendente
            niveles.sort((a, b) => b.volumen - a.volumen);
            
            return niveles;
        }

        function formatearListaOrdenada(texto, tipo) {
            if (!texto || texto === 'No hay datos') return '<div class="item">No hay datos disponibles</div>';
            
            const niveles = procesarNiveles(texto, tipo);
            
            if (niveles.length === 0) return '<div class="item">No hay datos disponibles</div>';
            
            return niveles.map(nivel => `
                <div class="item">
                    <span>📌 ${nivel.texto}</span>
                    <span class="volumen-badge">Vol: ${(nivel.volumen / 1000000).toFixed(1)}M</span>
                </div>
            `).join('');
        }

        // ============================================
        // MOSTRAR DETALLE COMPLETO CON HISTORIAL
        // ============================================
        function mostrarDetalleConHistorial(analisisArray) {
            const resultadoDiv = document.getElementById('resultadoDetalle');
            const ultimo = analisisArray[0];
            
            // Calcular porcentaje
            let porcentajeSubida = 0;
            if (ultimo.precio_apertura && ultimo.precio_apertura > 0 && ultimo.precio_cierre) {
                porcentajeSubida = ((ultimo.precio_cierre - ultimo.precio_apertura) / ultimo.precio_apertura) * 100;
            }
            const porcentajeClase = porcentajeSubida >= 0 ? 'positivo' : 'negativo';
            const porcentajeSimbolo = porcentajeSubida >= 0 ? '▲' : '▼';
            
            const fechaFormateada = new Date(ultimo.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
            
            // Convertir SMI a puntos y tendencias
            const puntosCorto = smiToPuntos(ultimo.smi_4h);
            const puntosMedio = smiToPuntos(ultimo.smi_diario);
            const puntosLargo = smiToPuntos(ultimo.smi_semanal);
            const tendenciaMedio = smiToTendencia(ultimo.smi_diario);
            const tendenciaClase = tendenciaMedio === 'Positiva' ? 'positivo' : (tendenciaMedio === 'Negativa' ? 'negativo' : '');
            
            // Señal activada si puntos > 7
            const senalActivada = puntosCorto >= 7;
            
            // Limpiar recomendación de lenguaje técnico
            let recomendacionLimpia = ultimo.recomendacion || 'Condiciones favorables para considerar entrada.';
            recomendacionLimpia = recomendacionLimpia
                .replace(/SMI\s*\d*h?/gi, '')
                .replace(/4h/gi, '')
                .replace(/diario/gi, '')
                .replace(/semanal/gi, '')
                .replace(/sobreventa/gi, '')
                .replace(/SOBREVENTA/gi, '')
                .replace(/SE IGNORA/gi, '')
                .replace(/NO en/g, 'no está en')
                .replace(/activada_por_4h/g, '')
                .replace(/\s+/g, ' ')
                .trim();
            
            if (recomendacionLimpia === '' || recomendacionLimpia.includes('no se cumplen')) {
                if (senalActivada) {
                    recomendacionLimpia = '✅ SE ACTIVA SEÑAL DE COMPRA - Las condiciones técnicas son favorables para entrar en el mercado.';
                } else {
                    recomendacionLimpia = '⏳ CONDICIONES NO FAVORABLES - Aún no se cumplen todos los criterios técnicos. Se recomienda esperar a que se activen las condiciones.';
                }
            }
            
            // Generar tabla de historial (sin términos técnicos)
            let historialHtml = `
                <div class="seccion">
                    <h3>📜 HISTORIAL DE ANÁLISIS (Últimos ${analisisArray.length})</h3>
                    <div class="scroll-horizontal">
                        <table class="tabla-historial">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Precio</th>
                                    <th>Desde Apertura</th>
                                    <th>Tipo Señal</th>
                                    <th>Recomendación</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            for (const a of analisisArray) {
                const fecha = new Date(a.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
                let pct = 0;
                if (a.precio_apertura && a.precio_apertura > 0 && a.precio_cierre) {
                    pct = ((a.precio_cierre - a.precio_apertura) / a.precio_apertura) * 100;
                }
                const pctSimbolo = pct >= 0 ? '▲' : '▼';
                const tipoSenal = descripcionCompra[a.caso_numero] || (a.activada_por_4h ? 'Señal Activada' : 'En espera');
                
                historialHtml += `
                    <tr>
                        <td>${fecha}</td>
                        <td><strong>${a.precio_cierre}€</strong></td>
                        <td>${pctSimbolo} ${Math.abs(pct).toFixed(2)}%</td>
                        <td>${tipoSenal.substring(0, 40)}...</td>
                        <td style="max-width: 200px; white-space: normal;">${a.recomendacion ? a.recomendacion.replace(/SMI|4h|diario|semanal|sobreventa/gi, '').substring(0, 60) + '...' : '-'}</td>
                    </tr>
                `;
            }
            
            historialHtml += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            let html = `
                <button class="btn-cerrar" onclick="cerrarDetalle()">← Volver a señales</button>
                
                <div class="tipo-compra-tag">${descripcionCompra[ultimo.caso_numero] || 'Señal de Compra'}</div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <h3>🏢 Empresa</h3>
                        <div class="valor">${ultimo.nombre_empresa}</div>
                        <div class="small">${ultimo.ticker}</div>
                    </div>
                    <div class="info-card">
                        <h3>💰 Precio Actual</h3>
                        <div class="valor">${ultimo.precio_cierre} €</div>
                        <div class="small ${porcentajeClase}">${porcentajeSimbolo} ${Math.abs(porcentajeSubida).toFixed(2)}% desde apertura</div>
                    </div>
                    <div class="info-card">
                        <h3>📅 Último análisis</h3>
                        <div class="valor">${fechaFormateada}</div>
                        <div class="small">Hora España</div>
                    </div>
                </div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <h3>🕐 CORTO PLAZO</h3>
                        ${generarBarra(puntosCorto)}
                        <div class="barra-label">${senalActivada ? '✅ Señal activada' : '⏳ Esperando condición'}</div>
                    </div>
                    <div class="info-card">
                        <h3>📈 MEDIO PLAZO</h3>
                        ${generarBarra(puntosMedio)}
                        <div class="barra-label ${tendenciaClase}">Tendencia: ${tendenciaMedio}</div>
                    </div>
                    <div class="info-card">
                        <h3>📆 LARGO PLAZO</h3>
                        ${generarBarra(puntosLargo)}
                        <div class="barra-label">Contexto estructural</div>
                    </div>
                </div>
                
                <div class="seccion">
                    <h3>💡 RECOMENDACIÓN</h3>
                    <div class="recomendacion-texto">${recomendacionLimpia}</div>
                </div>
            `;
            
            // Niveles con orden por volumen
            if (ultimo.soportes || ultimo.resistencias) {
                html += `
                    <div class="seccion">
                        <h3>📊 NIVELES CLAVE (ordenados por importancia)</h3>
                        <div class="grid-2col">
                            <div>
                                <h4 style="margin-bottom: 10px; color: #28a745;">📉 SOPORTES</h4>
                                <div class="lista-items">${formatearListaOrdenada(ultimo.soportes, 'soporte')}</div>
                            </div>
                            <div>
                                <h4 style="margin-bottom: 10px; color: #dc3545;">📈 RESISTENCIAS</h4>
                                <div class="lista-items">${formatearListaOrdenada(ultimo.resistencias, 'resistencia')}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Gaps
            if (ultimo.gaps_alcistas || ultimo.gaps_bajistas) {
                html += `
                    <div class="seccion">
                        <h3>🕳️ GAPS</h3>
                        <div class="grid-2col">
                            <div>
                                <h4 style="margin-bottom: 10px; color: #28a745;">📈 Gaps Alcistas</h4>
                                <div class="lista-items">${formatearListaOrdenada(ultimo.gaps_alcistas, 'gap')}</div>
                            </div>
                            <div>
                                <h4 style="margin-bottom: 10px; color: #dc3545;">📉 Gaps Bajistas</h4>
                                <div class="lista-items">${formatearListaOrdenada(ultimo.gaps_bajistas, 'gap')}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Pinchos
            if (ultimo.pinchos_alcistas || ultimo.pinchos_bajistas) {
                html += `
                    <div class="seccion">
                        <h3>📍 PINCHOS</h3>
                        <div class="grid-2col">
                            <div>
                                <h4 style="margin-bottom: 10px; color: #28a745;">🔺 Pinchos Alcistas</h4>
                                <div class="lista-items">${formatearListaOrdenada(ultimo.pinchos_alcistas, 'pincho')}</div>
                            </div>
                            <div>
                                <h4 style="margin-bottom: 10px; color: #dc3545;">🔻 Pinchos Bajistas</h4>
                                <div class="lista-items">${formatearListaOrdenada(ultimo.pinchos_bajistas, 'pincho')}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Añadir historial
            html += historialHtml;
            
            resultadoDiv.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================
        // CERRAR DETALLE
        // ============================================
        function cerrarDetalle() {
            document.getElementById('seccionSeñales').classList.remove('hidden');
            document.getElementById('resultadoDetalle').classList.add('hidden');
            cargarSeñales();
        }

        // ============================================
        // BUSCAR EMPRESA ESPECÍFICA
        // ============================================
        async function buscarEmpresa() {
            const input = document.getElementById('inputEmpresa').value.trim();
            
            if (!input) {
                cargarSeñales();
                return;
            }
            
            const seccionSeñales = document.getElementById('seccionSeñales');
            const resultadoDiv = document.getElementById('resultadoDetalle');
            
            seccionSeñales.classList.add('hidden');
            resultadoDiv.classList.remove('hidden');
            resultadoDiv.innerHTML = '<div class="loading">🔄 Buscando...</div>';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?nombre_empresa=ilike.%25${encodeURIComponent(input)}%25&order=fecha.desc&limit=30`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) throw new Error('Error');
                
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    resultadoDiv.innerHTML = '<div class="error">❌ No se encontró ninguna empresa. Prueba con: Santander, BBVA, Inditex...</div><button class="btn-cerrar" onclick="cerrarDetalle()">← Volver</button>';
                    return;
                }
                
                mostrarDetalleConHistorial(data);
                
            } catch (error) {
                resultadoDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div><button class="btn-cerrar" onclick="cerrarDetalle()">← Volver</button>`;
            }
        }

        // ============================================
        // INICIALIZAR
        // ============================================
        document.getElementById('btnBuscar').addEventListener('click', buscarEmpresa);
        document.getElementById('inputEmpresa').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarEmpresa();
        });
        
        // Cargar señales al inicio
        cargarSeñales();
    </script>
</body>
</html>
