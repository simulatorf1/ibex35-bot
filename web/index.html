    <style>

        .buscador {

            gap: 12px;
            justify-content: center;

            flex-wrap: wrap;

        #inputEmpresa {
            flex: 1;
            max-width: 420px;
            padding: 14px 20px;

            outline: none;
            background: #ffffff;

            gap: 24px;

        .tabla-historial {

            border-collapse: collapse;
            font-size: 0.8rem;

        .tabla-historial th {

<body>
<div class="container">
    <div class="header-professional">
        <h1>📊 Análisis Estructuras · IBEX 35</h1>

    <div class="buscador">

    <div id="seccionSeñales" class="seccion-principal">
        <h2>🟢 SEÑALES ACTIVAS · COMPRA</h2>
        <div id="listaSeñales" class="grid-empresas">
            <div class="loading">🔄 Cargando señales en tiempo real...</div>
        </div>
    </div>

    <div id="resultadoDetalle" class="hidden"></div>
</div>

<script>
    const SUPABASE_URL = "https://klwcletpqqsabtdanldx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd2NsZXRwcXFzYWJ0ZGFubGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDg2NTEsImV4cCI6MjA5MjM4NDY1MX0.nbs0tYbFOL-I8qIkgB7Ub_jcOwHTdzg0EcAp1DS6sCU";

    const CASOS_SEÑAL = [1, 2, 3, 4, 5, 6, 7];
    
    // Descripciones profesionales y claras
    const descripcionCompra = {
        1: "COMPRA INMEDIATA - Señal directa por máxima fuerza alcista",
        2: "COMPRA CON CAUTELA - Buen potencial pero con riesgo moderado",
        3: "REBOTE CORTO PLAZO - Tendencia general aún bajista, oportunidad táctica",
        4: "COMPRA CONSOLIDADA - Tendencia alcista confirmada",
        5: "COMPRA FINAL - Última oportunidad antes de posible techo",
        6: "COMPRA RÁPIDA - Momento óptimo para entrada rápida",
        7: "PRE-COMPRA - A punto de activarse la señal, preparar entrada"
    };
    
    const resumenCorto = {
        1: "Compra Inmediata", 2: "Compra Cautela", 3: "Rebote Corto", 4: "Compra Consolidada", 5: "Compra Final", 6: "Compra Rápida", 7: "Pre-Compra"
    };

    function smiToPuntos(smi) {
        if (smi === null || smi === undefined) return 0;
        let puntos = Math.round(((80 - smi) / 160) * 10);
        puntos = Math.max(0, Math.min(10, puntos));
        return puntos;
    }

    function calcularTendenciaPorPendiente(analisisArray) {
        if (!analisisArray || analisisArray.length < 2) return { texto: "Espera", clase: "tendencia-espera" };
        const ultimo = analisisArray[0];
        const anterior = analisisArray[1];
        if (ultimo.smi_diario === null || anterior.smi_diario === null) return { texto: "Espera", clase: "tendencia-espera" };
        const diff = ultimo.smi_diario - anterior.smi_diario;
        if (diff > 0.3) return { texto: "Positiva ▲", clase: "tendencia-positiva" };
        if (diff < -0.3) return { texto: "Negativa ▼", clase: "tendencia-negativa" };
        return { texto: "Espera", clase: "tendencia-espera" };
    }

    function calcularPorcentajeVsCierreAnterior(analisisArray, index) {
        if (!analisisArray || analisisArray.length <= index + 1) return null;
        const actual = analisisArray[index];
        const anterior = analisisArray[index + 1];
        if (!actual.precio_cierre || !anterior.precio_cierre || anterior.precio_cierre === 0) return null;
        return ((actual.precio_cierre - anterior.precio_cierre) / anterior.precio_cierre) * 100;
    }

    function generarBarra(puntos) {
        let html = '<div class="barra">';
        for (let i = 0; i < 10; i++) {
            html += `<div class="punto ${i < puntos ? 'activo' : ''}"></div>`;
        }
        html += '</div>';
        return html;
    }

    // FUNCIÓN NUEVA: extraer hasta 3 niveles únicos (sin rangos, sin toques)
    function extraerTresNivelesLimpiar(texto, tipo) {
        if (!texto || texto === 'No hay datos') return [];
        const lineas = texto.split('\n');
        const numeros = [];
        
        for (let linea of lineas) {
            linea = linea.trim();
            if (!linea) continue;
            
            // Extraer números individuales del rango: "3.848-3.948€" -> sacamos 3.848 y 3.948
            const rangoMatch = linea.match(/([\d\.]+)\s*-\s*([\d\.]+)/);
            if (rangoMatch) {
                let num1 = rangoMatch[1].replace(/\./g, '');
                let num2 = rangoMatch[2].replace(/\./g, '');
                numeros.push(parseFloat(num1));
                numeros.push(parseFloat(num2));
            } else {
                // Si es un número suelto
                const numMatch = linea.match(/([\d\.]+)/);
                if (numMatch) {
                    let num = parseFloat(numMatch[1].replace(/\./g, ''));
                    numeros.push(num);
                }
            }
        }
        
        // Eliminar duplicados
        const unicos = [...new Set(numeros)];
        
        if (tipo === 'soporte') {
            // Soportes: ordenar de MAYOR a MENOR (los más cercanos al precio arriba)
            unicos.sort((a, b) => b - a);
        } else {
            // Resistencias: ordenar de MENOR a MAYOR
            unicos.sort((a, b) => a - b);
        }
        
        // Devolver solo los 3 primeros como string formateado
        return unicos.slice(0, 3).map(n => {
            // Si es número grande (ej 3848) mostrarlo con 2 decimales
            if (n > 100) return `${n.toFixed(2)} €`;
            return `${n} €`;
        });
    }

    function formatearNiveles(texto, tipo) {
        const niveles = extraerTresNivelesLimpiar(texto, tipo);
        if (niveles.length === 0) return '<div class="item">No hay niveles destacados</div>';
        return niveles.map(n => `<div class="item">📍 ${n}</div>`).join('');
    }

    // formatear mechas (antes pinchos) sin toques
    function extraerTresMechas(texto) {
        if (!texto || texto === 'No hay datos') return [];
        const lineas = texto.split('\n');
        const mechas = [];
        for (let linea of lineas) {
            linea = linea.trim();
            if (!linea) continue;
            // Limpiar solo el texto de toques si existe
            let limpia = linea.replace(/\s*\(\d+\s*toques\)/i, '').trim();
            mechas.push(limpia);
            if (mechas.length >= 3) break;
        }
        return mechas.slice(0, 3);
    }
    function formatearMechas(texto) {
        const items = extraerTresMechas(texto);
        if (items.length === 0) return '<div class="item">Sin velas destacadas</div>';
        return items.map(i => `<div class="item">🕯️ ${i}</div>`).join('');
    }

    async function cargarSeñales() {
        const listaDiv = document.getElementById('listaSeñales');
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?select=*&order=fecha.desc&limit=300`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!response.ok) throw new Error('Error');
            const todos = await response.json();
            
            const tickerMap = new Map();
            for (const item of todos) {
                if (!tickerMap.has(item.ticker)) tickerMap.set(item.ticker, []);
                tickerMap.get(item.ticker).push(item);
            }
            for (let [ticker, arr] of tickerMap.entries()) {
                arr.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            }
            
            const ultimosConVariacion = [];
            for (let [ticker, arr] of tickerMap.entries()) {
                if (arr.length === 0) continue;
                const ultimo = arr[arr.length - 1];
                let variacion = null;
                if (arr.length >= 2) {
                    const anterior = arr[arr.length - 2];
                    if (anterior.precio_cierre && anterior.precio_cierre > 0) {
                        variacion = ((ultimo.precio_cierre - anterior.precio_cierre) / anterior.precio_cierre) * 100;
                    }
                }
                ultimosConVariacion.push({ ...ultimo, variacionVsAnterior: variacion });
            }
            
            const señalEmpresas = ultimosConVariacion.filter(a => CASOS_SEÑAL.includes(a.caso_numero));
            señalEmpresas.sort((a,b) => {
                const orden = [1, 6, 4, 2, 7, 3, 5];
                return orden.indexOf(a.caso_numero) - orden.indexOf(b.caso_numero);
            });
            mostrarSeñales(señalEmpresas);
        } catch (err) {
            listaDiv.innerHTML = '<div class="error">❌ Error al cargar señales</div>';
        }
    }

    function mostrarSeñales(empresas) {
        const listaDiv = document.getElementById('listaSeñales');
        if (empresas.length === 0) {
            listaDiv.innerHTML = '<div style="background: white; border-radius: 28px; padding: 40px; text-align:center;">📭 No hay empresas con señal activa ahora mismo.</div>';
            return;
        }
        let html = '';
        for (const emp of empresas) {
            const pctVal = emp.variacionVsAnterior !== null ? emp.variacionVsAnterior : 0;
            const clasePct = pctVal >= 0 ? 'positivo' : 'negativo';
            const simbolo = pctVal >= 0 ? '▲' : '▼';
            const fechaFormateada = new Date(emp.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
            const badgeStrong = (emp.caso_numero === 1 || emp.caso_numero === 6 || emp.caso_numero === 4) ? 'strong-buy' : '';
            html += `
                <div class="tarjeta-empresa" onclick="verDetalle('${emp.ticker}')">
                    <div class="tarjeta-nombre">${emp.nombre_empresa || emp.ticker}</div>
                    <div class="tarjeta-ticker">${emp.ticker}</div>
                    <div class="tarjeta-precio">${emp.precio_cierre} €</div>
                    <div class="tarjeta-porcentaje ${clasePct}">${simbolo} ${Math.abs(pctVal).toFixed(2)}%</div>
                    <div class="tipo-compra-badge ${badgeStrong}">${resumenCorto[emp.caso_numero] || 'Señal'}</div>
                    <div class="tarjeta-fecha">📅 ${fechaFormateada}</div>
                </div>
            `;
        }
        listaDiv.innerHTML = html;
    }

    async function verDetalle(ticker) {
        const seccionSeñales = document.getElementById('seccionSeñales');
        const resultadoDiv = document.getElementById('resultadoDetalle');
        seccionSeñales.classList.add('hidden');
        resultadoDiv.classList.remove('hidden');
        resultadoDiv.innerHTML = '<div class="loading">📊 Cargando análisis...</div>';
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?ticker=eq.${encodeURIComponent(ticker)}&order=fecha.desc&limit=50`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!response.ok) throw new Error('Error');
            let data = await response.json();
            if (!data || data.length === 0) throw new Error('Sin datos');
            data.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            mostrarDetalleCompleto(data);
        } catch (err) {
            resultadoDiv.innerHTML = `<div class="error">Error: ${err.message}</div><button class="btn-cerrar" onclick="cerrarDetalle()">← Volver</button>`;
        }
    }

    function mostrarDetalleCompleto(analisisArrayAsc) {

        const ultimo = analisisArrayAsc[analisisArrayAsc.length - 1];
        
        let variacionUltimo = null;

            const anterior = analisisArrayAsc[analisisArrayAsc.length - 2];

            }
        }
        const pctValor = variacionUltimo !== null ? variacionUltimo : 0;
        const clasePct = pctValor >= 0 ? 'positivo' : 'negativo';
        const simbolo = pctValor >= 0 ? '▲' : '▼';
        const fechaFormateada = new Date(ultimo.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });

        const puntosCorto = smiToPuntos(ultimo.smi_4h);
        const puntosMedio = smiToPuntos(ultimo.smi_diario);
        const puntosLargo = smiToPuntos(ultimo.smi_semanal);
        const analisisReversed = [...analisisArrayAsc].reverse();
        const tendenciaObj = calcularTendenciaPorPendiente(analisisReversed);
        const tendenciaTexto = tendenciaObj.texto;
        const tendenciaClase = tendenciaObj.clase;
        const senalActivada = puntosCorto >= 7;
        
        // Recomendación limpia y profesional
        let recomendacionRaw = ultimo.recomendacion || '';
        let recomendacionLimpia = "";
        if (ultimo.caso_numero === 1) recomendacionLimpia = "🔥 COMPRA INMEDIATA: Señal directa activada. Condiciones de máxima fuerza alcista. Ejecutar entrada.";
        else if (ultimo.caso_numero === 2) recomendacionLimpia = "⚠️ COMPRA CON CAUTELA: Buen potencial pero con riesgo. Ajustar tamaño de posición.";
        else if (ultimo.caso_numero === 3) recomendacionLimpia = "📈 REBOTE CORTO PLAZO: Tendencia general bajista, pero oportunidad de rebote técnico.";
        else if (ultimo.caso_numero === 4) recomendacionLimpia = "✅ COMPRA CONSOLIDADA: Tendencia alcista confirmada. Mantener visión de medio plazo.";
        else if (ultimo.caso_numero === 5) recomendacionLimpia = "🏁 COMPRA FINAL: Última oportunidad antes de posible techo. Tomar beneficios parciales.";
        else if (ultimo.caso_numero === 6) recomendacionLimpia = "🚀 COMPRA RÁPIDA: Momento óptimo para entrada rápida. Stop ajustado.";
        else if (ultimo.caso_numero === 7) recomendacionLimpia = "⏳ PRE-COMPRA: Señal a punto de activarse. Preparar orden de compra con alerta.";
        else recomendacionLimpia = senalActivada ? "✅ SE ACTIVA SEÑAL DE COMPRA. Condiciones técnicas favorables." : "⏳ Condiciones no favorables. Esperar confirmación.";
        
        let historialHtml = `<div class="seccion"><h3>📜 HISTORIAL DE ANÁLISIS</h3><div class="scroll-horizontal"><table class="tabla-historial"><thead><tr><th>Fecha</th><th>Precio actual</th><th>Variación</th><th>Señal</th></tr></thead><tbody>`;
        for (let i = analisisArrayAsc.length - 1; i >= 0; i--) {
            const a = analisisArrayAsc[i];
            const fechaItem = new Date(a.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
            let variacionItem = null;
            if (i > 0) {
                const prev = analisisArrayAsc[i - 1];
                if (prev.precio_cierre && prev.precio_cierre > 0)
                    variacionItem = ((a.precio_cierre - prev.precio_cierre) / prev.precio_cierre) * 100;
            }
            const pctShow = variacionItem !== null ? `${variacionItem >= 0 ? '▲' : '▼'} ${Math.abs(variacionItem).toFixed(2)}%` : '--';
            const tipoSenal = resumenCorto[a.caso_numero] || (a.activada_por_4h ? 'Señal activa' : 'Sin señal');
            historialHtml += `<tr><td>${fechaItem}</td><td><strong>${a.precio_cierre}€</strong></td><td class="${variacionItem !== null && variacionItem >= 0 ? 'positivo' : 'negativo'}">${pctShow}</td><td>${tipoSenal}</td></tr>`;
        }
        historialHtml += `</tbody></table></div></div>`;
        
        let html = `
            <div class="resultado-detalle">
                <button class="btn-cerrar" onclick="cerrarDetalle()">← Volver a señales</button>
                <div class="tipo-compra-tag ${ultimo.caso_numero === 1 || ultimo.caso_numero === 4 || ultimo.caso_numero === 6 ? 'compra-destacada' : ''}">${descripcionCompra[ultimo.caso_numero] || 'ESTRATEGIA DE COMPRA'}</div>
                <div class="info-grid">
                    <div class="info-card"><h3>🏢 Empresa</h3><div class="valor">${ultimo.nombre_empresa}</div><div class="small">${ultimo.ticker}</div></div>
                    <div class="info-card"><h3>💰 Precio actual</h3><div class="valor">${ultimo.precio_cierre} €</div><div class="small-pct ${clasePct}">${simbolo} ${Math.abs(pctValor).toFixed(2)}%</div></div>
                    <div class="info-card"><h3>📅 Último análisis</h3><div class="valor">${fechaFormateada}</div></div>
                </div>
                <div class="info-grid">
                    <div class="info-card"><h3>🕐 CORTO PLAZO</h3>${generarBarra(puntosCorto)}<div class="barra-label">${senalActivada ? '✅ Señal activada' : '⏳ Esperando'}</div></div>
                    <div class="info-card"><h3>📈 MEDIO PLAZO</h3>${generarBarra(puntosMedio)}<div class="barra-label ${tendenciaClase}">Tendencia: ${tendenciaTexto}</div></div>
                    <div class="info-card"><h3>📆 LARGO PLAZO</h3>${generarBarra(puntosLargo)}<div class="barra-label">Contexto estructural</div></div>
                </div>
                <div class="seccion"><h3>💡 RECOMENDACIÓN TÉCNICA</h3><div class="recomendacion-texto" style="${(ultimo.caso_numero === 1 || ultimo.caso_numero === 4 || ultimo.caso_numero === 6) ? 'background:#1e7e34; color:white; font-weight:bold;' : ''}">${recomendacionLimpia}</div></div>
        `;
        
        // niveles clave: solo 3 soportes y 3 resistencias, sin rangos ni toques
        if (ultimo.soportes || ultimo.resistencias) {
            html += `<div class="seccion"><h3>📊 NIVELES CLAVE</h3><div class="grid-2col">
                        <div><h4 style="margin-bottom:10px; color:#1e7e34;">📉 SOPORTES (3 principales)</h4><div class="lista-items">${formatearNiveles(ultimo.soportes, 'soporte')}</div></div>
                        <div><h4 style="margin-bottom:10px; color:#b91c1c;">📈 RESISTENCIAS (3 principales)</h4><div class="lista-items">${formatearNiveles(ultimo.resistencias, 'resistencia')}</div></div>
                    </div></div>`;
        }
        
        if (ultimo.gaps_alcistas || ultimo.gaps_bajistas) {
            html += `<div class="seccion"><h3>🕳️ GAPS</h3><div class="grid-2col">
                        <div><h4 style="color:#1e7e34;">📈 Gaps Alcistas</h4><div class="lista-items">${formatearMechas(ultimo.gaps_alcistas)}</div></div>
                        <div><h4 style="color:#b91c1c;">📉 Gaps Bajistas</h4><div class="lista-items">${formatearMechas(ultimo.gaps_bajistas)}</div></div>
                    </div></div>`;
        }
        
        if (ultimo.pinchos_alcistas || ultimo.pinchos_bajistas) {
            html += `<div class="seccion"><h3>🕯️ VELAS CON MECHA LARGA</h3><div class="grid-2col">
                        <div><h4 style="color:#1e7e34;">🔺 Mechas alcistas</h4><div class="lista-items">${formatearMechas(ultimo.pinchos_alcistas)}</div></div>
                        <div><h4 style="color:#b91c1c;">🔻 Mechas bajistas</h4><div class="lista-items">${formatearMechas(ultimo.pinchos_bajistas)}</div></div>
                    </div></div>`;
        }
        
        html += historialHtml;
        html += `</div>`;
        resultadoDiv.innerHTML = html;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cerrarDetalle() {
        document.getElementById('seccionSeñales').classList.remove('hidden');
        document.getElementById('resultadoDetalle').classList.add('hidden');
        cargarSeñales();
    }

    async function buscarEmpresa() {
        const input = document.getElementById('inputEmpresa').value.trim();
        if (!input) { cargarSeñales(); return; }
        const seccionSeñales = document.getElementById('seccionSeñales');
        const resultadoDiv = document.getElementById('resultadoDetalle');
        seccionSeñales.classList.add('hidden');
        resultadoDiv.classList.remove('hidden');
        resultadoDiv.innerHTML = '<div class="loading">🔎 Buscando...</div>';
        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?nombre_empresa=ilike.%25${encodeURIComponent(input)}%25&order=fecha.desc&limit=50`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            if (!response.ok) throw new Error();
            let data = await response.json();
            if (!data || data.length === 0) {
                resultadoDiv.innerHTML = '<div class="error">❌ No encontrada</div><button class="btn-cerrar" onclick="cerrarDetalle()">← Volver</button>';
                return;
            }
            data.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            mostrarDetalleCompleto(data);
        } catch (e) {
            resultadoDiv.innerHTML = `<div class="error">Error</div><button class="btn-cerrar" onclick="cerrarDetalle()">← Volver</button>`;
        }
    }

    document.getElementById('btnBuscar').addEventListener('click', buscarEmpresa);
    document.getElementById('inputEmpresa').addEventListener('keypress', (e) => { if(e.key === 'Enter') buscarEmpresa(); });
    cargarSeñales();
    window.verDetalle = verDetalle;
    window.cerrarDetalle = cerrarDetalle;
</script>
</body>
</html>
