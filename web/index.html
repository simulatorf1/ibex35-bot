<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Técnico IBEX35</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitulo {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .buscador {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        #inputEmpresa {
            flex: 1;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #btnBuscar {
            padding: 15px 30px;
            font-size: 1rem;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
        }

        #btnBuscar:hover {
            background: #ff8c5a;
            transform: scale(1.02);
        }

        .seccion-principal {
            margin-bottom: 40px;
        }

        .seccion-principal h2 {
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
        }

        .grid-empresas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tarjeta-empresa {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeIn 0.3s ease;
        }

        .tarjeta-empresa:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .tarjeta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tarjeta-nombre {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1e3c72;
        }

        .tarjeta-ticker {
            font-size: 0.8rem;
            color: #888;
        }

        .caso-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-caso-1 { background: #dc3545; color: white; }
        .badge-caso-2 { background: #ffc107; color: #333; }
        .badge-caso-3 { background: #17a2b8; color: white; }
        .badge-caso-4 { background: #28a745; color: white; }

        .tarjeta-precio {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }

        .tarjeta-smis {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 0.8rem;
        }

        .smi-4h { color: #ff6b35; font-weight: bold; }
        .smi-diario { color: #1e3c72; font-weight: bold; }
        .positivo { color: #28a745; }
        .negativo { color: #dc3545; }

        .tarjeta-fecha {
            font-size: 0.7rem;
            color: #888;
            margin-top: 10px;
        }

        .sin-señales {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            color: white;
        }

        .resultado-detalle {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 20px;
            animation: fadeIn 0.3s ease;
        }

        .btn-cerrar {
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .btn-cerrar:hover {
            background: #5a6268;
        }

        .caso-tag {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .caso-1 { background: #dc3545; color: white; }
        .caso-2 { background: #ffc107; color: #333; }
        .caso-3 { background: #17a2b8; color: white; }
        .caso-4 { background: #28a745; color: white; }
        .caso-5 { background: #6c757d; color: white; }
        .caso-null { background: #6c757d; color: white; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .info-card h3 {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .info-card .valor {
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
        }

        .seccion {
            margin-top: 25px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .seccion h3 {
            margin-bottom: 15px;
            color: #1e3c72;
        }

        .lista-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.85rem;
            border-left: 3px solid #ff6b35;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .recomendacion-texto {
            font-size: 1.1rem;
            line-height: 1.5;
            background: #e9ecef;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* Estilos para el historial */
        .tabla-historial {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .tabla-historial th,
        .tabla-historial td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .tabla-historial th {
            background: #1e3c72;
            color: white;
            font-weight: bold;
        }

        .tabla-historial tr:hover {
            background: #f8f9fa;
        }

        .historial-caso-1 { background-color: #f8d7da; }
        .historial-caso-2 { background-color: #fff3cd; }
        .historial-caso-3 { background-color: #d1ecf1; }
        .historial-caso-4 { background-color: #d4edda; }
        .historial-caso-5 { background-color: #e2e3e5; }

        .scroll-horizontal {
            overflow-x: auto;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .grid-2col {
                grid-template-columns: 1fr;
            }
            .grid-empresas {
                grid-template-columns: 1fr;
            }
            .tabla-historial th,
            .tabla-historial td {
                font-size: 0.7rem;
                padding: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Analizador Técnico IBEX35</h1>
        <div class="subtitulo">SMI 4h como gatillo · Señales de compra en tiempo real · Historial de análisis</div>
        
        <div class="buscador">
            <input type="text" id="inputEmpresa" placeholder="Buscar empresa específica (ej: Santander, BBVA...)" autocomplete="off">
            <button id="btnBuscar">🔍 Analizar</button>
        </div>

        <!-- Sección: Empresas con señal de compra -->
        <div id="seccionSeñales" class="seccion-principal">
            <h2>🟢 EMPRESAS CON SEÑAL DE COMPRA HOY</h2>
            <div id="listaSeñales" class="grid-empresas">
                <div class="loading">🔄 Cargando señales...</div>
            </div>
        </div>

        <!-- Sección: Resultado detallado (se muestra al hacer clic) -->
        <div id="resultadoDetalle" class="hidden"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================
        const SUPABASE_URL = "https://klwcletpqqsabtdanldx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd2NsZXRwcXFzYWJ0ZGFubGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDg2NTEsImV4cCI6MjA5MjM4NDY1MX0.nbs0tYbFOL-I8qIkgB7Ub_jcOwHTdzg0EcAp1DS6sCU";

        // Casos que consideramos "señal de compra"
        const CASOS_COMPRA = [1, 2, 3, 4];

        // ============================================
        // CARGAR EMPRESAS CON SEÑAL
        // ============================================
        async function cargarSeñales() {
            const listaDiv = document.getElementById('listaSeñales');
            
            try {
                // Obtener el análisis más reciente de cada empresa
                const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?select=*&order=fecha.desc&limit=100`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) throw new Error('Error cargando empresas');
                
                const todosLosAnalisis = await response.json();
                
                // Agrupar por ticker y quedarse con el último
                const ultimosAnalisis = {};
                for (const analisis of todosLosAnalisis) {
                    const ticker = analisis.ticker;
                    if (!ultimosAnalisis[ticker] || new Date(analisis.fecha) > new Date(ultimosAnalisis[ticker].fecha)) {
                        ultimosAnalisis[ticker] = analisis;
                    }
                }
                
                // Filtrar solo los que tienen caso de compra
                const casosCompra = Object.values(ultimosAnalisis).filter(a => CASOS_COMPRA.includes(a.caso));
                
                mostrarSeñales(casosCompra);
                
            } catch (error) {
                console.error('Error:', error);
                listaDiv.innerHTML = '<div class="sin-señales">❌ Error al cargar las señales</div>';
            }
        }

        // ============================================
        // MOSTRAR TARJETAS DE SEÑALES
        // ============================================
        function mostrarSeñales(empresas) {
            const listaDiv = document.getElementById('listaSeñales');
            
            if (empresas.length === 0) {
                listaDiv.innerHTML = '<div class="sin-señales">📭 No hay empresas con señal de compra en este momento</div>';
                return;
            }
            
            const casosTexto = {
                1: '🔴 COMPRA YA',
                2: '🟡 COMPRA CON RIESGO',
                3: '🔵 REBOTE CORTO',
                4: '🟢 SUBIDA'
            };
            
            let html = '';
            for (const emp of empresas) {
                const pendienteClase = emp.pendiente_diaria > 0 ? 'positivo' : 'negativo';
                const pendienteSimbolo = emp.pendiente_diaria > 0 ? '▲' : '▼';
                const fechaFormateada = new Date(emp.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
                
                html += `
                    <div class="tarjeta-empresa" onclick="verDetalle('${emp.ticker}')">
                        <div class="tarjeta-header">
                            <div>
                                <span class="tarjeta-nombre">${emp.nombre_empresa}</span>
                                <span class="tarjeta-ticker">${emp.ticker}</span>
                            </div>
                            <span class="caso-badge badge-caso-${emp.caso}">${casosTexto[emp.caso]}</span>
                        </div>
                        <div class="tarjeta-precio">${emp.precio_cierre} €</div>
                        <div class="tarjeta-smis">
                            <span class="smi-4h">SMI 4h: ${emp.smi_4h ?? 'N/A'}</span>
                            <span>SMI diario: ${emp.smi_diario ?? 'N/A'}</span>
                            <span class="${pendienteClase}">${pendienteSimbolo} ${Math.abs(emp.pendiente_diaria)}</span>
                        </div>
                        <div class="tarjeta-fecha">
                            📅 ${fechaFormateada}
                        </div>
                    </div>
                `;
            }
            
            listaDiv.innerHTML = html;
        }

        // ============================================
        // VER DETALLE DE EMPRESA CON HISTORIAL
        // ============================================
        async function verDetalle(ticker) {
            const seccionSeñales = document.getElementById('seccionSeñales');
            const resultadoDiv = document.getElementById('resultadoDetalle');
            
            seccionSeñales.classList.add('hidden');
            resultadoDiv.classList.remove('hidden');
            resultadoDiv.innerHTML = '<div class="loading">🔄 Cargando datos...</div>';
            
            try {
                // Obtener últimos 30 análisis de la empresa
                const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?ticker=eq.${encodeURIComponent(ticker)}&order=fecha.desc&limit=30`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) throw new Error('Error cargando detalle');
                
                const data = await response.json();
                
                if (data && data.length > 0) {
                    mostrarDetalleConHistorial(data);
                } else {
                    resultadoDiv.innerHTML = '<div class="error">No se encontraron datos</div>';
                }
                
            } catch (error) {
                resultadoDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        // ============================================
        // MOSTRAR DETALLE COMPLETO CON HISTORIAL
        // ============================================
        function mostrarDetalleConHistorial(analisisArray) {
            const resultadoDiv = document.getElementById('resultadoDetalle');
            const ultimo = analisisArray[0]; // El más reciente
            
            const casosTexto = {
                1: '🔴 CASO 1: COMPRA YA',
                2: '🟡 CASO 2: COMPRA CON RIESGO',
                3: '🔵 CASO 3: REBOTE CORTO',
                4: '🟢 CASO 4: SUBIDA (Ojo resistencias)',
                5: '⚪ CASO 5: ÚLTIMA SUBIDA',
                null: '⚪ SIN SEÑAL 4h'
            };
            
            const pendienteClase = ultimo.pendiente_diaria > 0 ? 'positivo-texto' : 'negativo-texto';
            const pendienteTexto = ultimo.pendiente_diaria > 0 ? '▲ Positiva' : '▼ Negativa';
            const smi4hClase = ultimo.smi_4h < -40 ? 'positivo-texto' : '';
            const fechaFormateada = new Date(ultimo.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
            
            const formatearLista = (texto) => {
                if (!texto) return '<div class="item">No hay datos</div>';
                const lineas = texto.split('\n');
                return lineas.map(linea => `<div class="item">📌 ${linea}</div>`).join('');
            };
            
            // Generar tabla de historial
            let historialHtml = `
                <div class="seccion">
                    <h3>📜 HISTORIAL DE ANÁLISIS (Últimos ${analisisArray.length})</h3>
                    <div class="scroll-horizontal">
                        <table class="tabla-historial">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Precio</th>
                                    <th>SMI 4h</th>
                                    <th>SMI Diario</th>
                                    <th>Pendiente</th>
                                    <th>Caso</th>
                                    <th>Recomendación</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            
            for (const a of analisisArray) {
                const fecha = new Date(a.fecha).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' });
                const casoClase = `historial-caso-${a.caso || 0}`;
                const pendienteSimbolo = a.pendiente_diaria > 0 ? '▲' : (a.pendiente_diaria < 0 ? '▼' : '●');
                
                let casoTexto = '';
                if (a.caso === 1) casoTexto = '🔴 COMPRA YA';
                else if (a.caso === 2) casoTexto = '🟡 COMPRA RIESGO';
                else if (a.caso === 3) casoTexto = '🔵 REBOTE CORTO';
                else if (a.caso === 4) casoTexto = '🟢 SUBIDA';
                else if (a.caso === 5) casoTexto = '⚪ ÚLTIMA SUBIDA';
                else casoTexto = '⚪ SIN SEÑAL';
                
                historialHtml += `
                    <tr class="${casoClase}">
                        <td>${fecha}</td>
                        <td><strong>${a.precio_cierre}€</strong></td>
                        <td>${a.smi_4h ?? 'N/A'}</td>
                        <td>${a.smi_diario ?? 'N/A'}</td>
                        <td>${pendienteSimbolo} ${Math.abs(a.pendiente_diaria || 0)}</td>
                        <td>${casoTexto}</td>
                        <td style="max-width: 200px; white-space: normal;">${a.recomendacion ? a.recomendacion.substring(0, 60) + '...' : '-'}</td>
                    </tr>
                `;
            }
            
            historialHtml += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            let html = `
                <button class="btn-cerrar" onclick="cerrarDetalle()">← Volver a señales</button>
                
                <div class="caso-tag caso-${ultimo.caso || 'null'}">${casosTexto[ultimo.caso]}</div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <h3>🏢 Empresa</h3>
                        <div class="valor">${ultimo.nombre_empresa}</div>
                        <div class="small">${ultimo.ticker}</div>
                    </div>
                    <div class="info-card">
                        <h3>💰 Precio Actual</h3>
                        <div class="valor">${ultimo.precio_cierre} €</div>
                        <div class="small">Último cierre</div>
                    </div>
                    <div class="info-card">
                        <h3>📅 Último análisis</h3>
                        <div class="valor">${fechaFormateada}</div>
                        <div class="small">Hora España</div>
                    </div>
                </div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <h3>🕐 SMI 4h</h3>
                        <div class="valor ${smi4hClase}">${ultimo.smi_4h ?? 'N/A'}</div>
                        <div class="small">${ultimo.smi_4h < -40 ? '✅ Señal activada' : 'Sin señal'}</div>
                    </div>
                    <div class="info-card">
                        <h3>📈 SMI Diario</h3>
                        <div class="valor">${ultimo.smi_diario ?? 'N/A'}</div>
                        <div class="small ${pendienteClase}">Pendiente: ${pendienteTexto}</div>
                    </div>
                    <div class="info-card">
                        <h3>📆 SMI Semanal</h3>
                        <div class="valor">${ultimo.smi_semanal ?? 'N/A'}</div>
                        <div class="small">Contexto</div>
                    </div>
                </div>
                
                <div class="seccion">
                    <h3>💡 RECOMENDACIÓN</h3>
                    <div class="recomendacion-texto">${ultimo.recomendacion || 'Sin recomendación'}</div>
                </div>
            `;
            
            // Niveles
            if (ultimo.soportes || ultimo.resistencias) {
                html += `
                    <div class="seccion">
                        <h3>📊 NIVELES CLAVE</h3>
                        <div class="grid-2col">
                            <div>
                                <h4 style="margin-bottom: 10px; color: #28a745;">📉 SOPORTES</h4>
                                <div class="lista-items">${formatearLista(ultimo.soportes)}</div>
                            </div>
                            <div>
                                <h4 style="margin-bottom: 10px; color: #dc3545;">📈 RESISTENCIAS</h4>
                                <div class="lista-items">${formatearLista(ultimo.resistencias)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Gaps
            if (ultimo.gaps_alcistas || ultimo.gaps_bajistas) {
                html += `
                    <div class="seccion">
                        <h3>🕳️ GAPS</h3>
                        <div class="grid-2col">
                            <div>
                                <h4 style="margin-bottom: 10px; color: #28a745;">📈 Gaps Alcistas</h4>
                                <div class="lista-items">${formatearLista(ultimo.gaps_alcistas)}</div>
                            </div>
                            <div>
                                <h4 style="margin-bottom: 10px; color: #dc3545;">📉 Gaps Bajistas</h4>
                                <div class="lista-items">${formatearLista(ultimo.gaps_bajistas)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Pinchos
            if (ultimo.pinchos_alcistas || ultimo.pinchos_bajistas) {
                html += `
                    <div class="seccion">
                        <h3>📍 PINCHOS</h3>
                        <div class="grid-2col">
                            <div>
                                <h4 style="margin-bottom: 10px; color: #28a745;">🔺 Pinchos Alcistas</h4>
                                <div class="lista-items">${formatearLista(ultimo.pinchos_alcistas)}</div>
                            </div>
                            <div>
                                <h4 style="margin-bottom: 10px; color: #dc3545;">🔻 Pinchos Bajistas</h4>
                                <div class="lista-items">${formatearLista(ultimo.pinchos_bajistas)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // Añadir historial
            html += historialHtml;
            
            resultadoDiv.innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================
        // CERRAR DETALLE
        // ============================================
        function cerrarDetalle() {
            document.getElementById('seccionSeñales').classList.remove('hidden');
            document.getElementById('resultadoDetalle').classList.add('hidden');
            cargarSeñales();
        }

        // ============================================
        // BUSCAR EMPRESA ESPECÍFICA
        // ============================================
        async function buscarEmpresa() {
            const input = document.getElementById('inputEmpresa').value.trim();
            
            if (!input) {
                cargarSeñales();
                return;
            }
            
            const seccionSeñales = document.getElementById('seccionSeñales');
            const resultadoDiv = document.getElementById('resultadoDetalle');
            
            seccionSeñales.classList.add('hidden');
            resultadoDiv.classList.remove('hidden');
            resultadoDiv.innerHTML = '<div class="loading">🔄 Buscando...</div>';
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/recomendaciones_ibex?nombre_empresa=ilike.%25${encodeURIComponent(input)}%25&order=fecha.desc&limit=30`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                if (!response.ok) throw new Error('Error');
                
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    resultadoDiv.innerHTML = '<div class="error">❌ No se encontró ninguna empresa. Prueba con: Santander, BBVA, Inditex...</div><button class="btn-cerrar" onclick="cerrarDetalle()">← Volver</button>';
                    return;
                }
                
                mostrarDetalleConHistorial(data);
                
            } catch (error) {
                resultadoDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div><button class="btn-cerrar" onclick="cerrarDetalle()">← Volver</button>`;
            }
        }

        // ============================================
        // INICIALIZAR
        // ============================================
        document.getElementById('btnBuscar').addEventListener('click', buscarEmpresa);
        document.getElementById('inputEmpresa').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarEmpresa();
        });
        
        // Cargar señales al inicio
        cargarSeñales();
    </script>
</body>
</html>
