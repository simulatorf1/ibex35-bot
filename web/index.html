<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Estructuras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📊 Analizador Técnico IBEX35</h1>
        <div class="subtitulo">
            🔴 CASOS 1-5: Requieren SMI 4h en sobreventa (GATILLO)<br>
            🟣 CASOS 6-7: Solo requieren SMI DIARIO en sobreventa (SEÑAL DIRECTA)
        </div>
        
        <div class="buscador">
            <input type="text" id="inputEmpresa" placeholder="Buscar empresa específica (ej: Santander, BBVA...)" autocomplete="off">
            <button id="btnBuscar">🔍 Analizar</button>
        </div>

        <div id="seccionSeñales" class="seccion-principal">
            <h2>🟢 EMPRESAS CON SEÑAL (CASOS 1-7)</h2>
            <div id="listaSeñales" class="grid-empresas">
                <div class="loading">🔄 Cargando señales...</div>
            </div>
        </div>

        <div id="resultadoDetalle" class="hidden"></div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
