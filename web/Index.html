<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador IBEX35</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: white; margin-bottom: 30px; }
        .buscador {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        #inputEmpresa {
            flex: 1;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            outline: none;
        }
        #btnBuscar {
            padding: 15px 30px;
            font-size: 1rem;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .resultado {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .caso-1 { background: #28a745; color: white; display: inline-block; padding: 8px 16px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        .caso-2 { background: #ffc107; color: #333; display: inline-block; padding: 8px 16px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        .caso-3 { background: #17a2b8; color: white; display: inline-block; padding: 8px 16px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        .caso-4 { background: #007bff; color: white; display: inline-block; padding: 8px 16px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        .caso-5 { background: #dc3545; color: white; display: inline-block; padding: 8px 16px; border-radius: 50px; margin-bottom: 20px; font-weight: bold; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .info-card { background: #f8f9fa; padding: 15px; border-radius: 12px; text-align: center; }
        .info-card h3 { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
        .info-card .valor { font-size: 1.5rem; font-weight: bold; color: #333; }
        .seccion { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; }
        .seccion h3 { margin-bottom: 15px; color: #1e3c72; }
        .error { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 10px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Analizador Técnico IBEX35</h1>
        
        <div class="buscador">
            <input type="text" id="inputEmpresa" placeholder="Ej: Santander, BBVA, Inditex..." autocomplete="off">
            <button id="btnBuscar">🔍 Analizar</button>
        </div>

        <div id="resultado" class="resultado hidden"></div>
        <div id="error" class="error hidden"></div>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE - CAMBIA SOLO ESTOS DOS VALORES
        const SUPABASE_URL = "https://klwcletpqqsabtdanldx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtsd2NsZXRwcXFzYWJ0ZGFubGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDg2NTEsImV4cCI6MjA5MjM4NDY1MX0.nbs0tYbFOL-I8qIkgB7Ub_jcOwHTdzg0EcAp1DS6sCU";

        async function buscarEmpresa() {
            const input = document.getElementById('inputEmpresa').value.trim();
            const resultadoDiv = document.getElementById('resultado');
            const errorDiv = document.getElementById('error');
            
            if (!input) {
                errorDiv.textContent = 'Escribe un nombre de empresa';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            resultadoDiv.classList.add('hidden');
            errorDiv.classList.add('hidden');
            resultadoDiv.innerHTML = '<div class="info-card">🔄 Buscando...</div>';
            resultadoDiv.classList.remove('hidden');
            
            try {
                const url = `${SUPABASE_URL}/rest/v1/recomendaciones_ibex?nombre_empresa=ilike.%25${encodeURIComponent(input)}%25&order=fecha.desc&limit=1`;
                console.log("URL:", url);
                
                const response = await fetch(url, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                console.log("Status:", response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }
                
                const data = await response.json();
                console.log("Datos:", data);
                
                if (!data || data.length === 0) {
                    errorDiv.textContent = 'No se encontró ninguna empresa con ese nombre';
                    errorDiv.classList.remove('hidden');
                    resultadoDiv.classList.add('hidden');
                    return;
                }
                
                mostrarResultado(data[0]);
                
            } catch (error) {
                console.error("Error completo:", error);
                errorDiv.textContent = `Error: ${error.message}`;
                errorDiv.classList.remove('hidden');
                resultadoDiv.classList.add('hidden');
            }
        }

        function mostrarResultado(dato) {
            const resultadoDiv = document.getElementById('resultado');
            
            const casosTexto = {
                1: '🔴 COMPRA YA',
                2: '🟡 COMPRA CON RIESGO',
                3: '🔵 REBOTE CORTO',
                4: '🟢 SUBIDA (Ojo resistencias)',
                5: '⚡ ÚLTIMA SUBIDA'
            };
            
            let html = `
                <div class="caso-${dato.caso}">${casosTexto[dato.caso] || 'Sin señal'}</div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <h3>🏢 Empresa</h3>
                        <div class="valor">${dato.nombre_empresa}</div>
                        <small>${dato.ticker}</small>
                    </div>
                    <div class="info-card">
                        <h3>💰 Precio</h3>
                        <div class="valor">${dato.precio_cierre}€</div>
                    </div>
                    <div class="info-card">
                        <h3>📅 Fecha</h3>
                        <div class="valor">${new Date(dato.fecha).toLocaleString()}</div>
                    </div>
                </div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <h3>🕐 SMI 4h</h3>
                        <div class="valor">${dato.smi_4h ?? 'N/A'}</div>
                        ${dato.smi_4h < -40 ? '<small>✅ Señal activada</small>' : '<small>Sin señal</small>'}
                    </div>
                    <div class="info-card">
                        <h3>📈 SMI Diario</h3>
                        <div class="valor">${dato.smi_diario ?? 'N/A'}</div>
                        <small>Pendiente: ${dato.pendiente_diaria > 0 ? '✅ Positiva' : '❌ Negativa'}</small>
                    </div>
                    <div class="info-card">
                        <h3>📆 SMI Semanal</h3>
                        <div class="valor">${dato.smi_semanal ?? 'N/A'}</div>
                    </div>
                </div>
                
                <div class="seccion">
                    <h3>📊 RECOMENDACIÓN</h3>
                    <p>${dato.recomendacion || 'Sin recomendación'}</p>
                </div>
            `;
            
            resultadoDiv.innerHTML = html;
            resultadoDiv.classList.remove('hidden');
        }

        document.getElementById('btnBuscar').addEventListener('click', buscarEmpresa);
        document.getElementById('inputEmpresa').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') buscarEmpresa();
        });
        
        // Prueba al cargar
        console.log("Web cargada. URL Supabase:", SUPABASE_URL);
    </script>
</body>
</html>
